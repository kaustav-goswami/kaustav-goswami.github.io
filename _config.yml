# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "Kaustav Goswami"
email: "kaustavgoswami.2013@gmail.com"
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
twitter_username: username
github_username: username
minimal_mistakes_skin: default
search: true

locale                   : "en-US"
title                    : "Kaustav Goswami"
title_separator          : "-"
subtitle                 : "PhD Student at UC Davis"
name                     : "Kaustav Goswami" # <br>কৌস্তভ গৌস্ৱামী"
url                      : # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
baseurl                  : "/"
repository               : # GitHub username/repo-name e.g. "mmistakes/minimal-mistakes"
teaser                   : # path of fallback teaser image, e.g. "/assets/images/500x300.png"
logo                     : # "/assets/images/apple-touch-icon.png" # path of logo image to display in the masthead, e.g. "/assets/images/88x88.png"
masthead_title           : "কৌস্তভ গৌস্ৱামী" # overrides the website title displayed in the masthead, use " " for no title
# breadcrumbs            : false # true, false (default)
words_per_minute         : 60

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

collections:
  portfolio:
    output: true
    permalink: /:collection/:path/
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Site Author
author:
  name             : "Kaustav Goswami"
  avatar           : "/assets/images/base/profile.jpg"
  bio              : "I am a computer architect. I mostly simulate things. Apart from being nerdy, I like to travel, take pictures and sketch stuff."
  # email            : "kaustavgoswami.2013@gmail.com"
  location         : "Davis, CA"
  links:
    - label: "email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:kaustavgoswami.2013@gmail.com"
    - label: "Resume"
      icon: "fas fa-fw fa-file-pdf"
      url: "https://drive.google.com/file/d/1PBDADUWy4BOgSD9nSkTO-7WFXGQ23r6U/view?usp=sharing"
    - label: "Google Scholar"
      icon: "fab fa-fw fa-google-scholar"
      url: "https://scholar.google.com/citations?user=1_1FgAoAAAAJ&hl=en"
    # - label: "DBLP"
    #   icon: "fas fas-fw fa-dblp"
    #   url: "https://dblp.org/pid/05/7642-2.html"
    # - label: "Twitter"
    #   icon: "fab fa-fw fa-twitter-square"
    #   url: "https://twitter.com/_kaustav_g_"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kaustav-goswami"
    # - label: "Instagram"
    #   icon: "fab fa-fw fa-instagram"
    #   url: "https://instagram.com/self._kg"


# Site Footer
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/_kaustav_g_"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kaustav-goswami"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/self._kg"
  since: "2013"


defaults:
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: true
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
